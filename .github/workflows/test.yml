name: Tests

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/test.yml"
      - ".pre-commit-config.yaml"
  pull_request:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/test.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.14 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: 의존성 설치
        run: |
          pip install -r scripts/requirements.txt
          pip install pytest ruff

      - name: ruff 검사
        run: ruff check scripts/

      - name: ruff 포맷 검사
        run: ruff format --check scripts/

      - name: pytest 실행
        run: python -m pytest scripts/tests/ -v
